# ==========================================
# 自動タグ: main に push されるたびにパッチバージョンを上げる
#
# 例: v0.0.0 → v0.0.1 → v0.0.2 ...
#
# マイナー/メジャーを上げたい場合:
#   コミットメッセージに [minor] → v0.0.2 → v0.1.0
#   コミットメッセージに [major] → v0.1.0 → v1.0.0
# ==========================================
name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest-tag
        run: |
          LATEST=$(git tag -l 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next-version
        run: |
          CURRENT="${{ steps.latest-tag.outputs.tag }}"
          VERSION="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            PATCH=$((PATCH + 1))
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next-version.outputs.version }}" \
            -m "Release ${{ steps.next-version.outputs.version }} (${{ steps.next-version.outputs.bump }})"
          git push origin "${{ steps.next-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next-version.outputs.version }}
          name: Release ${{ steps.next-version.outputs.version }}
          generate_release_notes: true
          draft: false
