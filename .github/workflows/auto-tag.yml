# ==========================================
# 自動タグ: main に push されるたびにパッチバージョンを上げる
#
# 例: v1.0.0 → v1.0.1 → v1.0.2 ...
#
# マイナー/メジャーを上げたい場合:
#   コミットメッセージに [minor] → v1.0.2 → v1.1.0
#   コミットメッセージに [major] → v1.1.0 → v2.0.0
#
# 初回はタグがないため v0.1.0 から開始
# ==========================================
name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: バージョンタグ作成
    runs-on: ubuntu-latest
    # deploy.yml との二重実行を防ぐ: このワークフローでタグを作成
    # → deploy.yml がタグトリガーでデプロイを実行

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # タグ履歴の取得に必要

      - name: 最新タグを取得
        id: latest-tag
        run: |
          LATEST=$(git tag -l 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "最新タグ: $LATEST"

      - name: 次のバージョンを計算
        id: next-version
        run: |
          CURRENT="${{ steps.latest-tag.outputs.tag }}"
          # v プレフィックスを除去
          VERSION="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # コミットメッセージからバージョンアップの種類を判定
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            PATCH=$((PATCH + 1))
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "次のバージョン: $NEXT (${COMMIT_MSG%$'\n'*})"

      - name: タグを作成して push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next-version.outputs.version }}" \
            -m "Release ${{ steps.next-version.outputs.version }} (${{ steps.next-version.outputs.bump }})"
          git push origin "${{ steps.next-version.outputs.version }}"
          echo "タグ ${{ steps.next-version.outputs.version }} を作成しました"

  # タグ作成後にデプロイを実行
  deploy:
    needs: tag
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
