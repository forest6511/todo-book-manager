# ==========================================
# CI: テスト・ビルド検証
# PR 作成時と develop への push で実行
# main への push は auto-tag.yml 内で CI を実行するため除外
# ==========================================
name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: bookmanager
          POSTGRES_USER: bookuser
          POSTGRES_PASSWORD: bookpass
        ports:
          - 5432:5432
        volumes:
          - pgdata:/var/lib/postgresql
        options: >-
          --health-cmd="pg_isready -U bookuser -d bookmanager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run tests
        working-directory: backend
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: local

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/
          retention-days: 7

  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Spring Boot JAR
        working-directory: backend
        run: ./gradlew bootJar
