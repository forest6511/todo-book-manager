# ==========================================
# CD: タグ push または main マージで ECS へ自動デプロイ
#
# ブランチ戦略:
#   feature/* → develop（PR + CI）
#   develop → main（PR + CI）
#   main に push → dev 環境へデプロイ
#   v*.*.* タグ push → 本番環境へデプロイ（セマンティックバージョニング）
#
# タグの付け方:
#   git tag v1.0.0
#   git push origin v1.0.0
# ==========================================
name: Deploy to ECS

on:
  push:
    # 手動タグ push 時のみ直接トリガー
    # main push → auto-tag.yml → deploy.yml (workflow_call) の流れ
    tags: ['v*.*.*']
  workflow_call:

env:
  AWS_REGION: ap-northeast-1
  CONTAINER_NAME: app

permissions:
  id-token: write
  contents: write  # リリース作成に必要

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: ECS デプロイ
    runs-on: ubuntu-latest
    needs: ci
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'development' }}

    env:
      # タグ push → prod 用リソース名、main push → dev 用リソース名
      ECR_REPOSITORY: ${{ startsWith(github.ref, 'refs/tags/v') && 'book-manager-prod' || 'book-manager-dev' }}
      ECS_SERVICE: ${{ startsWith(github.ref, 'refs/tags/v') && 'book-manager-prod' || 'book-manager-dev' }}
      ECS_CLUSTER: ${{ startsWith(github.ref, 'refs/tags/v') && 'book-manager-prod' || 'book-manager-dev' }}

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v6

      - name: バージョン情報を抽出
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            IMAGE_TAG="v${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            IMAGE_TAG="${GITHUB_SHA::8}"
            echo "version=dev-${IMAGE_TAG}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: AWS 認証（OIDC）
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR にログイン
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a

      - name: Docker イメージをビルド & プッシュ
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: ECS タスク定義を更新
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@c804dfbdd57f713b6c079302a4c01db7017a36fc
        with:
          task-definition-arn: arn:aws:ecs:${{ env.AWS_REGION }}:${{ secrets.AWS_ACCOUNT_ID }}:task-definition/${{ env.ECS_SERVICE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: ECS にデプロイ
        uses: aws-actions/amazon-ecs-deploy-task-definition@df9643053eda01f169e64a0e60233aacca83799a
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # タグ push 時のみ GitHub Release を作成
      - name: GitHub Release を作成
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
